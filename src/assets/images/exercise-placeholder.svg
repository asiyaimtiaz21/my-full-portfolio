<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="exBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ede4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfd4c5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#exBg)"/>

  <!-- Subtle dot pattern -->
  <circle cx="200" cy="160" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="400" cy="160" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="600" cy="160" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="800" cy="160" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="1000" cy="160" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="200" cy="340" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="400" cy="340" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="600" cy="340" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="800" cy="340" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="1000" cy="340" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="200" cy="515" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="400" cy="515" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="600" cy="515" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="800" cy="515" r="2" fill="#800020" opacity="0.07"/>
  <circle cx="1000" cy="515" r="2" fill="#800020" opacity="0.07"/>

  <!-- Corner brackets -->
  <polyline points="60,60 60,120 120,120" fill="none" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
  <polyline points="1140,60 1140,120 1080,120" fill="none" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
  <polyline points="60,615 60,555 120,555" fill="none" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
  <polyline points="1140,615 1140,555 1080,555" fill="none" stroke="#800020" stroke-width="1.5" opacity="0.3"/>

  <!-- Dumbbell icon -->
  <g transform="translate(600, 252)" opacity="0.82">
    <!-- Left weight plate outer -->
    <rect x="-130" y="-36" width="28" height="72" rx="5" fill="#800020" opacity="0.2"/>
    <!-- Left weight plate inner -->
    <rect x="-108" y="-28" width="18" height="56" rx="3" fill="#800020" opacity="0.15"/>
    <!-- Right weight plate outer -->
    <rect x="102" y="-36" width="28" height="72" rx="5" fill="#800020" opacity="0.2"/>
    <!-- Right weight plate inner -->
    <rect x="90" y="-28" width="18" height="56" rx="3" fill="#800020" opacity="0.15"/>
    <!-- Bar -->
    <rect x="-90" y="-10" width="180" height="20" rx="10" fill="#800020" opacity="0.22"/>
    <!-- Handle grip lines -->
    <line x1="-50" y1="-6" x2="-50" y2="6" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
    <line x1="-30" y1="-6" x2="-30" y2="6" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
    <line x1="-10" y1="-6" x2="-10" y2="6" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
    <line x1="10"  y1="-6" x2="10"  y2="6" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
    <line x1="30"  y1="-6" x2="30"  y2="6" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
    <line x1="50"  y1="-6" x2="50"  y2="6" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Label -->
  <text x="600" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="46"
        fill="#1c1a18" text-anchor="middle" font-style="italic" opacity="0.82">Exercise Tracker</text>

  <!-- Divider -->
  <line x1="492" y1="394" x2="708" y2="394" stroke="#800020" stroke-width="1" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="600" y="424" font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="#7a6a61" text-anchor="middle" letter-spacing="3.5">REACT WEB APPLICATION</text>
</svg>
