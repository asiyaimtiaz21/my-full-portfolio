<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="readBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ede4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfd4c5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#readBg)"/>

  <!-- Subtle grid texture -->
  <line x1="0" y1="135" x2="1200" y2="135" stroke="#800020" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="270" x2="1200" y2="270" stroke="#800020" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="405" x2="1200" y2="405" stroke="#800020" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="540" x2="1200" y2="540" stroke="#800020" stroke-width="0.4" opacity="0.08"/>
  <line x1="240" y1="0" x2="240" y2="675" stroke="#800020" stroke-width="0.4" opacity="0.08"/>
  <line x1="480" y1="0" x2="480" y2="675" stroke="#800020" stroke-width="0.4" opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="675" stroke="#800020" stroke-width="0.4" opacity="0.08"/>
  <line x1="960" y1="0" x2="960" y2="675" stroke="#800020" stroke-width="0.4" opacity="0.08"/>

  <!-- Corner brackets -->
  <polyline points="60,60 60,120 120,120" fill="none" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
  <polyline points="1140,60 1140,120 1080,120" fill="none" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
  <polyline points="60,615 60,555 120,555" fill="none" stroke="#800020" stroke-width="1.5" opacity="0.3"/>
  <polyline points="1140,615 1140,555 1080,555" fill="none" stroke="#800020" stroke-width="1.5" opacity="0.3"/>

  <!-- Open book icon -->
  <g transform="translate(600, 252)">
    <!-- Left page -->
    <path d="M-90,-56 C-70,-60 -30,-60 0,-54 L0,54 C-30,48 -70,48 -90,44 Z"
          fill="#800020" opacity="0.15"/>
    <!-- Right page -->
    <path d="M90,-56 C70,-60 30,-60 0,-54 L0,54 C30,48 70,48 90,44 Z"
          fill="#800020" opacity="0.15"/>
    <!-- Spine -->
    <rect x="-4" y="-58" width="8" height="116" rx="2" fill="#800020" opacity="0.25"/>
    <!-- Page lines left -->
    <line x1="-72" y1="-24" x2="-14" y2="-22" stroke="#800020" stroke-width="1" opacity="0.2"/>
    <line x1="-72" y1="-8"  x2="-14" y2="-6"  stroke="#800020" stroke-width="1" opacity="0.2"/>
    <line x1="-72" y1="8"   x2="-14" y2="10"  stroke="#800020" stroke-width="1" opacity="0.2"/>
    <line x1="-72" y1="24"  x2="-14" y2="26"  stroke="#800020" stroke-width="1" opacity="0.2"/>
    <!-- Page lines right -->
    <line x1="72" y1="-24" x2="14" y2="-22" stroke="#800020" stroke-width="1" opacity="0.2"/>
    <line x1="72" y1="-8"  x2="14" y2="-6"  stroke="#800020" stroke-width="1" opacity="0.2"/>
    <line x1="72" y1="8"   x2="14" y2="10"  stroke="#800020" stroke-width="1" opacity="0.2"/>
    <line x1="72" y1="24"  x2="14" y2="26"  stroke="#800020" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Label -->
  <text x="600" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="46"
        fill="#1c1a18" text-anchor="middle" font-style="italic" opacity="0.82">Reading Platform</text>

  <!-- Divider -->
  <line x1="492" y1="394" x2="708" y2="394" stroke="#800020" stroke-width="1" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="600" y="424" font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="#7a6a61" text-anchor="middle" letter-spacing="3.5">FULL-STACK WEB APPLICATION</text>
</svg>
