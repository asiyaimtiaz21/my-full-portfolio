<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="csBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2220;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c1a18;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#csBg)"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#800020;stop-opacity:0.12"/>
    <stop offset="100%" style="stop-color:#800020;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- Corner brackets (light on dark) -->
  <polyline points="72,72 72,140 140,140" fill="none" stroke="#faf7f2" stroke-width="1.5" opacity="0.18"/>
  <polyline points="1128,72 1128,140 1060,140" fill="none" stroke="#faf7f2" stroke-width="1.5" opacity="0.18"/>
  <polyline points="72,603 72,535 140,535" fill="none" stroke="#faf7f2" stroke-width="1.5" opacity="0.18"/>
  <polyline points="1128,603 1128,535 1060,535" fill="none" stroke="#faf7f2" stroke-width="1.5" opacity="0.18"/>

  <!-- Crimson accent line top -->
  <line x1="440" y1="240" x2="760" y2="240" stroke="#800020" stroke-width="1" opacity="0.5"/>

  <!-- Eyebrow text -->
  <text x="600" y="278" font-family="Arial, Helvetica, sans-serif" font-size="12"
        fill="#faf7f2" text-anchor="middle" letter-spacing="5" opacity="0.45">BRANDING DESIGN</text>

  <!-- Main heading -->
  <text x="600" y="358" font-family="Georgia, 'Times New Roman', serif" font-size="72"
        fill="#faf7f2" text-anchor="middle" font-style="italic" opacity="0.92">Coming Soon</text>

  <!-- Crimson accent line bottom -->
  <line x1="440" y1="388" x2="760" y2="388" stroke="#800020" stroke-width="1" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="600" y="424" font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="#faf7f2" text-anchor="middle" letter-spacing="2.5" opacity="0.38">Case study in progress</text>
</svg>
